<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клиенты и партнёры — Costa Brava</title>
<meta name="description" content="Клиенты Costa Brava: Coca-Cola Uzbekistan, Golden House, AKFA, Artel, Enter Engineering и другие. Партнёры: Sika, BASF, Schneider Electric, ABB, Daikin.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .client-logo-card {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 140px;
    padding: 24px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .client-logo {
    max-width: 100%;
    max-height: 80px;
    object-fit: contain;
    filter: grayscale(100%);
    opacity: 0.8;
    transition: all 0.3s ease;
  }
  .client-logo-card:hover .client-logo {
    filter: grayscale(0%);
    opacity: 1;
    transform: scale(1.05);
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand"><span class="brand-mark">CB</span>COSTA BRAVA</a>
    <nav class="nav-links">
      <a href="index.html">Главная</a>
      <a href="about.html">О компании</a>
      <a href="services.html">Услуги</a>
      <a href="projects.html">Проекты</a>
      <a href="clients.html" class="active">Клиенты</a>
      <a href="careers.html">Карьера</a>
      <a href="contact.html">Контакты</a>
    </nav>
    <div class="header-actions">
      <button class="theme-toggle" aria-label="Переключить тему">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <a href="contact.html" class="btn btn-primary" style="padding:12px 22px;">КП</a>
      <button class="burger" aria-label="Меню"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<section class="page-hero">
  <div class="hero-media"><img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1800&q=75" alt="Деловое сотрудничество"></div>
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Главная</a> / Клиенты</div>
    <div class="eyebrow">Нам доверяют</div>
    <h1>Компании, которые выбирают надёжность</h1>
  </div>
</section>

<section>
  <div class="container">
    <div class="section-head reveal">
      <div><div class="eyebrow">Клиенты</div><h2>Наши заказчики</h2></div>
    </div>
    <div class="grid-4 reveal reveal-stagger">
      <div class="card text-center client-logo-card" style="--i:0"><img src="coca-cola.png" alt="Coca-Cola" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:1"><img src="golden-house.jpg" alt="Golden House" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:2"><img src="soda.png" alt="Soda" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:3"><img src="akfa.png" alt="AKFA" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:4"><img src="artel.png" alt="Artel" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:5"><img src="murad.jpg" alt="Murad Buildings" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:6"><img src="enter.jpg" alt="Enter Engineering" class="client-logo"></div>
      <div class="card text-center client-logo-card" style="--i:7"><img src="uzauto.png" alt="UzAuto Motors" class="client-logo"></div>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
