<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клиенты и партнёры — Costa Brava</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .client-logo-card {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 140px;
    padding: 24px;
    transition: transform 0.3s ease;
  }
  .client-logo {
    max-width: 100%;
    max-height: 80px;
    object-fit: contain;
    transition: transform 0.3s ease;
  }
  .client-logo-card:hover .client-logo {
    transform: scale(1.05);
  }
</style>
</head>
<body>

<section>
  <div class="container">
    <h2>Наши заказчики</h2>
    <div class="grid-4">
      <div class="card text-center client-logo-card"><img src="coca-cola.png" alt="Coca-Cola" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="golden-house.jpg" alt="Golden House" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="soda.png" alt="Soda" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="akfa.png" alt="AKFA" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="artel.png" alt="Artel" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="murad.jpg" alt="Murad Buildings" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="enter.jpg" alt="Enter Engineering" class="client-logo"></div>
      <div class="card text-center client-logo-card"><img src="uzauto.png" alt="UzAuto Motors" class="client-logo"></div>
    </div>
  </div>
</section>

</body>
</html>
